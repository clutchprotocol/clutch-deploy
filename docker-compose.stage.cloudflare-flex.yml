# Stage / VPS: origin HTTP :80 (TLS terminates at Cloudflare, e.g. SSL mode Flexible).
# For transparency we publish node RPC/metrics ports externally (8081-8083, 3001-3003).
# P2P ports (4001-4003) remain internal.
#
# docker compose -p clutch-stage -f docker-compose.yml -f docker-compose.stage.cloudflare-flex.yml up -d
services:
  node1:
    ports:
      - "8081:8081"
      - "3001:3001"

  node2:
    ports:
      - "8082:8082"
      - "3002:3002"

  node3:
    ports:
      - "8083:8083"
      - "3003:3003"

  clutch-hub-api:
    ports: !reset []

  prometheus:
    ports: !reset []

  grafana:
    ports: !reset []

  seq:
    ports: !reset []

  # Pre-built image (see clutch-hub-demo-app CI). `docker compose pull` updates stage without --build.
  clutch-hub-demo-app:
    ports: !reset []
    image: ghcr.io/clutchprotocol/clutch-hub-demo-app:latest

  nginx-stage:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./config/nginx/nginx.stage.cloudflare-flex.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - clutch-hub-api
      - clutch-hub-demo-app
    networks:
      - clutch-network
    command: ["nginx", "-g", "daemon off;"]
    restart: unless-stopped
