# Stage / VPS: origin HTTP :80 only; TLS terminates at Cloudflare (e.g. SSL mode Flexible).
# Use with docker-compose.yml only — do not stack another overlay that re-publishes node/API ports.
#
# docker compose -p clutch-stage -f docker-compose.yml -f docker-compose.stage.cloudflare-flex.yml up -d
services:
  node1:
    ports: !reset []

  node2:
    ports: !reset []

  node3:
    ports: !reset []

  clutch-hub-api:
    ports: !reset []

  prometheus:
    ports: !reset []

  grafana:
    ports: !reset []

  seq:
    ports: !reset []

  clutch-hub-demo-app:
    ports: !reset []
    build:
      context: ..
      dockerfile: clutch-hub-demo-app/Dockerfile

  nginx-stage:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./config/nginx/nginx.stage.cloudflare-flex.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - clutch-hub-api
      - clutch-hub-demo-app
    networks:
      - clutch-network
    command: ["nginx", "-g", "daemon off;"]
    restart: unless-stopped
