# Clutch Protocol - Full Stack Deployment
# Node + API + Monitoring
# Uses pre-built images from GHCR / Docker Hub

services:
  # Clutch blockchain nodes
  node1:
    image: ghcr.io/clutchprotocol/clutch-node:latest
    stop_grace_period: 30s
    networks:
      - clutch-network
    ports:
      - "8081:8081"
      - "4001:4001"
      - "3001:3001"
    volumes:
      - ./config:/app/config:ro
    command: ["--env", "node1"]
    restart: unless-stopped

  node2:
    image: ghcr.io/clutchprotocol/clutch-node:latest
    stop_grace_period: 30s
    depends_on:
      - node1
    networks:
      - clutch-network
    ports:
      - "8082:8082"
      - "4002:4002"
      - "3002:3002"
    volumes:
      - ./config:/app/config:ro
    command: ["--env", "node2"]
    restart: unless-stopped

  node3:
    image: ghcr.io/clutchprotocol/clutch-node:latest
    stop_grace_period: 30s
    depends_on:
      - node1
    networks:
      - clutch-network
    ports:
      - "8083:8083"
      - "4003:4003"
      - "3003:3003"
    volumes:
      - ./config:/app/config:ro
    command: ["--env", "node3"]
    restart: unless-stopped

  # Clutch Hub API (bridges apps to node)
  clutch-hub-api:
    image: ghcr.io/clutchprotocol/clutch-hub-api:latest
    depends_on:
      - node1
      - seq
    ports:
      - "3000:3000"
    environment:
      - RUST_LOG=info
      - CLUTCH_NODE_WS_URL=ws://node1:8081/ws
      - SEQ_URL=http://seq:80
      - SEQ_API_KEY=${SEQ_API_KEY:-}
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - clutch-network
    volumes:
      - ./config/api:/app/config:ro

  # Prometheus - metrics collection
  prometheus:
    image: prom/prometheus
    networks:
      - clutch-network
    ports:
      - "9090:9090"
    volumes:
      - prometheus-data:/prometheus
      - ./config/monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/etc/prometheus/console_libraries"
      - "--web.console.templates=/etc/prometheus/consoles"
      - "--storage.tsdb.retention.time=200h"
      - "--web.enable-lifecycle"
    restart: unless-stopped

  # Grafana - dashboards 
  grafana:
    image: grafana/grafana
    depends_on:
      - prometheus
    networks:
      - clutch-network
    ports:
      - "3030:3030"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./config/monitoring/grafana/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
      - ./config/monitoring/grafana/dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml:ro
      - ./config/monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards/clutch:ro
    environment:
      - GF_SERVER_HTTP_PORT=3030
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_SECURITY_ALLOW_EMBEDDING=true
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
    restart: unless-stopped

  # Seq - structured logging
  seq:
    image: datalust/seq
    networks:
      - clutch-network
    ports:
      - "5341:80"
    volumes:
      - seq-data:/data
    environment:
      - ACCEPT_EULA=Y
      # Enable authentication on first run (requires empty/new /data volume)
      - SEQ_FIRSTRUN_ADMINUSERNAME=${SEQ_ADMIN_USERNAME:-admin}
      - SEQ_FIRSTRUN_ADMINPASSWORD=${SEQ_ADMIN_PASSWORD:-}
    restart: unless-stopped

  # Demo app (React + map-based ride request)
  clutch-hub-demo-app:
    image: ghcr.io/clutchprotocol/clutch-hub-demo-app:latest
    ports:
      - "5173:80"
    depends_on:
      - clutch-hub-api
    networks:
      - clutch-network
    restart: unless-stopped

  clutch-explorer-backend:
    image: ghcr.io/clutchprotocol/clutch-explorer-backend:latest
    stop_grace_period: 30s
    depends_on:
      - node1
      - seq
      - clutch-explorer-postgres
      - clutch-explorer-indexer
    ports:
      - "8088:8088"
    environment:
      - APP_LOG_LEVEL=info
      - APP_DATA_SOURCE=postgres
      - APP_DATABASE_URL=postgres://${EXPLORER_POSTGRES_USER:-postgres}:${EXPLORER_POSTGRES_PASSWORD:-postgres}@clutch-explorer-postgres:5432/${EXPLORER_POSTGRES_DB:-clutch_explorer}
      - APP_CLUTCH_NODE_API_URL=http://node1:8081
      - APP_STRICT_MODE=true
      - APP_DEVELOPER_MODE=${EXPLORER_DEVELOPER_MODE:-false}
      - APP_SEQ_URL=http://seq:80
      - APP_SEQ_API_KEY=${SEQ_API_KEY:-}
      - APP_ALLOWED_ORIGINS=${EXPLORER_ALLOWED_ORIGINS:-*}
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8088/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - clutch-network
    volumes:
      - ./config/explorer:/app/config:ro

  clutch-explorer-indexer:
    image: ghcr.io/clutchprotocol/clutch-explorer-backend:latest
    stop_grace_period: 30s
    depends_on:
      - node1
      - seq
      - clutch-explorer-postgres
    command: ["/usr/local/bin/indexer", "--env", "default"]
    environment:
      - APP_LOG_LEVEL=info
      - APP_DATA_SOURCE=postgres
      - APP_DATABASE_URL=postgres://${EXPLORER_POSTGRES_USER:-postgres}:${EXPLORER_POSTGRES_PASSWORD:-postgres}@clutch-explorer-postgres:5432/${EXPLORER_POSTGRES_DB:-clutch_explorer}
      - APP_NODE_METRICS_URL=http://node1:3001/metrics
      - APP_NODE_WS_URL=http://node1:8081
      - APP_DEVELOPER_MODE=${EXPLORER_DEVELOPER_MODE:-false}
      - APP_INDEXER_POLL_INTERVAL_MS=4000
      - APP_INDEXER_START_HEIGHT=0
      - APP_SEQ_URL=http://seq:80
      - APP_SEQ_API_KEY=${SEQ_API_KEY:-}
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - clutch-network
    volumes:
      - ./config/explorer:/app/config:ro

  clutch-explorer-postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=${EXPLORER_POSTGRES_DB:-clutch_explorer}
      - POSTGRES_USER=${EXPLORER_POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${EXPLORER_POSTGRES_PASSWORD:-postgres}
    volumes:
      - clutch-explorer-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${EXPLORER_POSTGRES_USER:-postgres} -d ${EXPLORER_POSTGRES_DB:-clutch_explorer}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - clutch-network

  clutch-explorer-frontend:
    image: ghcr.io/clutchprotocol/clutch-explorer-frontend:latest
    ports:
      - "5174:80"
    depends_on:
      - clutch-explorer-backend
    networks:
      - clutch-network
    restart: unless-stopped

  # Optional: Nginx reverse proxy (use --profile proxy to enable)
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./config/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - clutch-hub-api
      - clutch-hub-demo-app
      - clutch-explorer-frontend
    networks:
      - clutch-network
    profiles:
      - proxy
    restart: unless-stopped

networks:
  clutch-network:
    driver: bridge

volumes:
  seq-data:
    driver: local
  grafana-data:
    driver: local
  prometheus-data:
    driver: local
  clutch-explorer-postgres-data:
    driver: local
