services:
  # Use local source for the API when developing
  clutch-hub-api:
    build:
      context: ../clutch-hub-api
      dockerfile: Dockerfile
    image: clutch-hub-api:dev
    # Reuse the same env and config as base compose
    env_file:
      - .env
    volumes:
      - ./config/api:/app/config:ro

  # Demo app: run Vite dev server with hot reload from local source
  clutch-hub-demo-app:
    image: node:20-alpine
    working_dir: /app
    # Install deps only when missing; retry npm ci for transient registry/DNS errors.
    # Use -f (file exists), not -x: Docker Desktop Windows bind mounts often drop the
    # executable bit, so .bin/vite looks "missing" and npm ci loops forever.
    # Start Vite via node + vite.js (no execute bit required on the shim).
    command: >-
      sh -c "set -eu;
      npm_ci_or_retry() {
        dir=$$1;
        cd \"$$dir\";
        tries=0;
        until [ $$tries -ge 5 ]; do
          if npm ci --no-audit --prefer-offline; then return 0; fi;
          tries=$$((tries + 1));
          echo \"npm ci failed in $$dir (attempt $$tries/5); cleaning and retrying\";
          rm -rf node_modules;
          sleep $$((tries * 10));
        done;
        echo \"npm ci failed in $$dir after 5 attempts\";
        return 1;
      };
      ensure_sdk_deps() {
        if [ -f /clutch-hub-sdk-js/node_modules/typescript/bin/tsc ] || [ -f /clutch-hub-sdk-js/node_modules/.bin/tsc ]; then
          echo \"SDK deps already present; skipping npm ci\";
        else
          echo \"SDK deps missing; running npm ci\";
          npm_ci_or_retry /clutch-hub-sdk-js;
        fi;
      };
      ensure_app_deps() {
        if [ -f /app/node_modules/vite/bin/vite.js ]; then
          echo \"App deps already present; skipping npm ci\";
        else
          echo \"App deps missing; running npm ci\";
          npm_ci_or_retry /app;
        fi;
      };
      npm config set fetch-retries 5;
      npm config set fetch-retry-mintimeout 20000;
      npm config set fetch-retry-maxtimeout 120000;
      npm config set fetch-timeout 600000;
      npm config set prefer-offline true;
      npm config set registry \"$$NPM_CONFIG_REGISTRY\";
      ensure_sdk_deps;
      ensure_app_deps;
      cd /app;
      if [ ! -f ./node_modules/vite/bin/vite.js ]; then
        echo \"vite not found after install (expected ./node_modules/vite/bin/vite.js)\"; exit 1;
      fi;
      exec node ./node_modules/vite/bin/vite.js --host 0.0.0.0 --port 80"
    environment:
      VITE_API_URL: http://127.0.0.1:3000
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "300"
      NPM_CONFIG_REGISTRY: ${NPM_CONFIG_REGISTRY:-https://registry.npmjs.org/}
      HTTP_PROXY: ${HTTP_PROXY:-}
      HTTPS_PROXY: ${HTTPS_PROXY:-}
      NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1,clutch-hub-api,node1,node2,node3}
    dns:
      - 1.1.1.1
      - 8.8.8.8
    volumes:
      - ../clutch-hub-demo-app:/app
      - ../clutch-hub-sdk-js:/clutch-hub-sdk-js
      - clutch-hub-demo-app-npm-cache:/root/.npm

  # Use local source for clutch-node (all three nodes share one dev image).
  #
  # Note: there is no ./clutch-node folder inside clutch-deploy on disk.
  # The clutch-node repo is a sibling folder (../clutch-node).
  #
  # Only node1 runs docker build. node2/node3 reuse the same tag; three parallel
  # builds of one tag fail with: image "clutch-node:dev" already exists.
  node1:
    build:
      context: ../clutch-node
      dockerfile: Dockerfile
    image: clutch-node:dev
    pull_policy: build

  node2:
    image: clutch-node:dev
    pull_policy: never
    depends_on:
      - node1

  node3:
    image: clutch-node:dev
    pull_policy: never
    depends_on:
      - node1

  # Monitoring/logging services (use base images; no dev overrides needed)
  prometheus: {}
  grafana: {}
  seq: {}

volumes:
  clutch-hub-demo-app-npm-cache:

