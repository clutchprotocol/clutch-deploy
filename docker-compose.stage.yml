services:
  # Stage: don't expose internal ports publicly; only reverse proxy should be public.
  node1:
    ports: []

  node2:
    ports: []

  node3:
    ports: []

  clutch-hub-api:
    ports: []

  prometheus:
    ports: []

  grafana:
    ports: []

  seq:
    ports: []

  clutch-hub-demo-app:
    ports: []

  # Stage reverse proxy (HTTP-only here; add TLS later if desired)
  nginx:
    profiles: [] # always on in stage
    volumes:
      - ./config/nginx/nginx.stage.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - clutch-hub-api
      - clutch-hub-demo-app
