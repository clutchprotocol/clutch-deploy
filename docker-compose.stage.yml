services:
  # Stage: don't expose internal ports publicly; only reverse proxy should be public.
  node1:
    ports: []

  node2:
    ports: []

  node3:
    ports: []

  clutch-hub-api:
    ports: []

  prometheus:
    ports: []

  grafana:
    ports: []

  seq:
    ports: []

  clutch-hub-demo-app:
    ports: []

  # Stage reverse proxy (HTTP-only here; add TLS later if desired)
  #
  # Note: this is a separate service name so it doesn't inherit the base
  # `nginx` service's `profiles: [proxy]` setting.
  nginx-stage:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./config/nginx/nginx.stage.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - clutch-hub-api
      - clutch-hub-demo-app
    networks:
      - clutch-network
    restart: unless-stopped
