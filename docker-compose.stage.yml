services:
  # Stage: don't expose internal ports publicly; only reverse proxy should be public.
  node1:
    ports: !reset []

  node2:
    ports: !reset []

  node3:
    ports: !reset []

  clutch-hub-api:
    ports: !reset []

  prometheus:
    ports: !reset []

  grafana:
    ports: !reset []

  seq:
    ports: !reset []

  clutch-hub-demo-app:
    ports: !reset []
    # Build from local source so changes to demo UI are reflected immediately.
    # This is primarily for local stage/testing; for production you can switch back to the prebuilt image.
    build:
      context: ..
      dockerfile: clutch-hub-demo-app/Dockerfile

  # Stage reverse proxy (HTTP-only here; add TLS later if desired)
  #
  # Note: this is a separate service name so it doesn't inherit the base
  # `nginx` service's `profiles: [proxy]` setting.
  nginx-stage:
    image: nginx:alpine
    ports:
      - "81:81"
      - "82:82"
    volumes:
      - ./config/nginx/nginx.stage.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - clutch-hub-api
      - clutch-hub-demo-app
    networks:
      - clutch-network
    # Generate a self-signed certificate for local/port-testing.
    # Keep it as a single-line command to avoid YAML line-splitting issues.
    command: sh -c "apk add --no-cache openssl >/dev/null 2>&1 || true; mkdir -p /etc/nginx/certs; if [ ! -f /etc/nginx/certs/fullchain.pem ] || [ ! -f /etc/nginx/certs/privkey.pem ]; then openssl req -x509 -nodes -newkey rsa:2048 -days 3650 -subj '/CN=stageweb.clutchprotocol.io' -keyout /etc/nginx/certs/privkey.pem -out /etc/nginx/certs/fullchain.pem; fi; exec nginx -g 'daemon off;'"
    restart: unless-stopped
